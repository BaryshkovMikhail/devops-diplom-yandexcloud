# ============================================================
# Настройки Prometheus для дипломного проекта
# Файл: monitoring/helm-values/prometheus-values.yaml
# ============================================================

# Общие настройки
fullnameOverride: prometheus

# Ресурсы (экономия для купона)
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 200m

# Хранение данных (минимальное для диплома)
server:
  persistentVolume:
    enabled: true
    size: 5Gi
    storageClass: "network-hdd"  # Экономия: HDD вместо SSD
  
  # Увеличим время хранения метрик для демонстрации
  retention: 15d
  
  # Дополнительные флаги для экономии ресурсов
  extraArgs:
    storage.tsdb.min-block-duration: 2h
    storage.tsdb.max-block-duration: 2h
  
  # ServiceMonitor для сбора метрик самого Prometheus
  serviceMonitor:
    selfMonitor: true

# Service для доступа к Prometheus UI
service:
  type: ClusterIP
  port: 9090

# Ingress (опционально, раскомментируйте если нужен доступ извне)
# ingress:
#   enabled: true
#   className: nginx
#   hosts:
#     - prometheus.diploma.local
#   paths:
#     - path: /
#       pathType: Prefix

# Настройка scrape-конфигов для сбора метрик кластера
serverFiles:
  prometheus.yml:
    scrape_configs:
      # Сбор метрик с нод (node-exporter)
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: replace
            source_labels: [__meta_kubernetes_node_label_kubernetes_io_hostname]
            target_label: instance
          - action: replace
            source_labels: [__meta_kubernetes_node_address_InternalIP]
            target_label: __address__
            regex: (.*)
            replacement: ${1}:9100
      
      # Сбор метрик с подов (если есть annotations)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
